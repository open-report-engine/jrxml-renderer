name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: temurin
        cache: maven
    
    - name: Install local dependencies
      run: |
        mvn install:install-file -Dfile=lib/ljp-7.0.6.jar -DgroupId=io.github.open-report-engine -DartifactId=ljp -Dversion=7.0.6 -Dpackaging=jar
    
    - name: Build with Maven
      run: mvn clean package -DskipTests
      
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: jrxml-renderer
        path: target/jrxml-renderer.jar
        if-no-files-found: error
